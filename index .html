<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>第五人格 2D P2P 联机版</title>
    <style>
        body { margin: 0; background: #1a1a1a; color: #fff; font-family: sans-serif; text-align: center; }
        #setup-ui { padding: 20px; }
        canvas { border: 4px solid #333; background: #222; display: none; margin: 10px auto; }
        .btn { padding: 10px 20px; background: #8b0000; color: white; border: none; cursor: pointer; font-size: 16px; }
        .btn:hover { background: #ff0000; }
        #status { color: #ffcc00; margin: 10px; }
    </style>
    <script src="https://unpkg.com/peerjs@1.4.7/dist/peerjs.min.js"></script>
</head>
<body>

    <h1>第五人格 2D 联机网页版</h1>
    
    <div id="setup-ui">
        <h3>第一步：选择你的阵营</h3>
        <button class="btn" onclick="chooseRole('hunter')">成为监管者 (厂长)</button>
        <button class="btn" onclick="chooseRole('survivor')">成为求生者 (园丁)</button>
        
        <br><br>
        <h3>第二步：创建或加入房间</h3>
        <p>你的联机ID: <span id="my-id">正在生成...</span></p>
        <button class="btn" onclick="startHost()">创建房间 (作为房主)</button>
        <br><br>
        <input type="text" id="join-id" placeholder="输入房主的联机ID" style="padding: 10px; width: 200px;">
        <button class="btn" onclick="joinRoom()">加入房间</button>
    </div>

    <div id="status"></div>
    <canvas id="gameCanvas" width="800" height="600"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        let peer, conn;
        let role = 'survivor'; 
        let isHost = false;

        // 游戏世界数据
        let player = { x: 100, y: 100, size: 20, color: '#3399ff', speed: 4 };
        let remotePlayer = { x: -100, y: -100, size: 24, color: '#ff3333', speed: 5 }; // 远端玩家
        let cipher = { x: 400, y: 300, size: 40, progress: 0, completed: false };

        // 初始化 PeerJS
        peer = new Peer();
        peer.on('open', (id) => {
            document.getElementById('my-id').innerText = id;
        });

        // 阵营选择
        function chooseRole(selected) {
            role = selected;
            if(role === 'hunter') {
                player.color = '#ff3333';
                player.speed = 5;
                player.size = 24;
            } else {
                player.color = '#3399ff';
                player.speed = 4;
                player.size = 20;
            }
            document.getElementById('status').innerText = `已选择阵营：${role === 'hunter'?'监管者':'求生者'}`;
        }

        // 房主启动
        function startHost() {
            isHost = true;
            document.getElementById('status').innerText = "房间已创建，等待求生者/监管者加入...";
            peer.on('connection', (connection) => {
                conn = connection;
                setupConnection();
            });
            startGameLoop();
        }

        // 玩家加入
        function joinRoom() {
            const targetId = document.getElementById('join-id').value;
            if(!targetId) return alert("请输入房主ID！");
            
            document.getElementById('status').innerText = "正在连接房主...";
            conn = peer.connect(targetId);
            setupConnection();
            startGameLoop();
        }

        // 设置数据通道
        function setupConnection() {
            document.getElementById('setup-ui').style.display = 'none';
            canvas.style.display = 'block';
            document.getElementById('status').innerText = "联机成功！游戏开始！使用 WASD 或方向键移动。";

            conn.on('data', (data) => {
                // 接收对方的位置和状态
                remotePlayer.x = data.x;
                remotePlayer.y = data.y;
                cipher.progress = data.cipherProgress;
                cipher.completed = data.cipherCompleted;
            });
        }

        // 键盘监听
        let keys = {};
        window.addEventListener('keydown', e => keys[e.key.toLowerCase()] = true);
        window.addEventListener('keyup', e => keys[e.key.toLowerCase()] = false);

        // 核心游戏循环
        function startGameLoop() {
            update();
            render();
            requestAnimationFrame(startGameLoop);
        }

        function update() {
            // 控制自己移动
            if (keys['w'] || keys['arrowup']) player.y -= player.speed;
            if (keys['s'] || keys['arrowdown']) player.y += player.speed;
            if (keys['a'] || keys['arrowleft']) player.x -= player.speed;
            if (keys['d'] || keys['arrowright']) player.x += player.speed;

            // 边界碰撞
            player.x = Math.max(player.size, Math.min(canvas.width - player.size, player.x));
            player.y = Math.max(player.size, Math.min(canvas.height - player.size, player.y));

            // 求生者修机逻辑
            if (role === 'survivor' && !cipher.completed) {
                let dist = Math.hypot(player.x - cipher.x, player.y - cipher.y);
                if (dist < 50) {
                    cipher.progress += 0.2; // 正在修机
                    if (cipher.progress >= 100) cipher.completed = true;
                }
            }

            // 监管者抓人判定 (简单距离碰撞)
            let huntDist = Math.hypot(player.x - remotePlayer.x, player.y - remotePlayer.y);
            if (huntDist < (player.size + remotePlayer.size)) {
                if(role === 'hunter') {
                    document.getElementById('status').innerText = "你抓到了求生者！监管者胜利！";
                }
            }

            // 发送自己的位置给对方
            if (conn && conn.open) {
                conn.send({
                    x: player.x,
                    y: player.y,
                    cipherProgress: cipher.progress,
                    cipherCompleted: cipher.completed
                });
            }
        }

        function render() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // 1. 画密码机
            ctx.fillStyle = cipher.completed ? '#00ff00' : '#ffff00';
            ctx.fillRect(cipher.x - cipher.size/2, cipher.y - cipher.size/2, cipher.size, cipher.size);
            ctx.fillStyle = '#fff';
            ctx.fillText(cipher.completed ? "密码机已破译" : `破译进度: ${Math.floor(cipher.progress)}%`, cipher.x - 40, cipher.y - 30);

            // 2. 画自己
            ctx.beginPath();
            ctx.arc(player.x, player.y, player.size, 0, Math.PI * 2);
            ctx.fillStyle = player.color;
            ctx.fill();
            ctx.closePath();
            ctx.fillText("你", player.x - 5, player.y - player.size - 5);

            // 3. 画对手
            ctx.beginPath();
            ctx.arc(remotePlayer.x, remotePlayer.y, remotePlayer.size, 0, Math.PI * 2);
            ctx.fillStyle = remotePlayer.color;
            ctx.fill();
            ctx.closePath();
            ctx.fillText("对手", remotePlayer.x - 10, remotePlayer.y - remotePlayer.size - 5);
        }
    </script>
</body>
</html>
